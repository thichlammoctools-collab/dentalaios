name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # manual trigger

env:
  CLOUDFLARE_ACCOUNT_ID: 6c99b69a2ef00c1754fae70793262cd3

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # ─── D1 Migrations ────────────────────────────────
      - name: Apply D1 migrations
        working-directory: apps/api
        run: npx wrangler d1 migrations apply dentalaios-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # ─── Deploy Worker ────────────────────────────────
      - name: Deploy Worker
        run: npm exec --workspace @dentalaios/api -- wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # ─── Build Frontend ───────────────────────────────
      - name: Build Frontend
        working-directory: apps/web
        run: npm run build
        env:
          VITE_API_URL: https://dentalaios.thichlammoctools.workers.dev

      # ─── Deploy Frontend to Pages ─────────────────────
      - name: Deploy Frontend
        run: npx wrangler pages deploy apps/web/dist --project-name=dentalaios-web --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
