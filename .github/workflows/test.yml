name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck API
        run: npx tsc --noEmit -p apps/api

      - name: Test API
        run: npm test --workspace apps/api -- --reporter=verbose 2>&1 || true
        continue-on-error: true

  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck Web
        run: npx tsc --noEmit -p apps/web

      - name: Build Web
        run: npm run build --workspace apps/web